<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copa do Mundo 2026 - K8 Fintech</title>

    <style>
        body{
            margin:0;
            font-family: Arial, sans-serif;
            background:#0b1220;
            color:white;
        }

        .header{
            background:#0f172a;
            padding:20px;
            text-align:center;
            border-bottom:3px solid #22c55e;
        }

        .header h1{
            margin:0;
            color:#22c55e;
        }

        .container{
            max-width:1200px;
            margin:auto;
            padding:20px;
        }

        .card{
            background:#1e293b;
            border-radius:10px;
            padding:20px;
            margin-bottom:20px;
        }

        .card h2{
            margin-top:0;
            color:#22c55e;
        }

        table{
            width:100%;
            border-collapse:collapse;
        }

        table th,
        table td{
            padding:10px;
            border-bottom:1px solid #334155;
            text-align:left;
        }

        .countdown{
            font-size:32px;
            font-weight:bold;
            color:#22c55e;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>🇧🇷 Copa do Mundo 2026 - K8 Fintech</h1>
</div>

<div class="container">

    <div class="card">
        <h2>Próximo Jogo do Brasil</h2>
        <div id="proximoJogo">Carregando...</div>
    </div>

    <div class="card">
        <h2>Jogos do Brasil</h2>
        <table id="tabelaJogos">
            <thead>
                <tr>
                    <th>Data</th>
                    <th>Mandante</th>
                    <th>Visitante</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

</div>

<script>

fetch('dados.json')
.then(response => response.json())
.then(data => {

    document.getElementById('proximoJogo').innerHTML = `
        <h3>
            ${data.proximo_jogo.mandante}
            x
            ${data.proximo_jogo.visitante}
        </h3>

        <p>
            📅 ${data.proximo_jogo.data}
            - ${data.proximo_jogo.hora}
        </p>

        <p>
            🏟️ ${data.proximo_jogo.estadio}
        </p>
    `;

    let tbody = document.querySelector('#tabelaJogos tbody');

    data.jogos_brasil.forEach(jogo => {

        tbody.innerHTML += `
            <tr>
                <td>${jogo.data}</td>
                <td>${jogo.mandante}</td>
                <td>${jogo.visitante}</td>
                <td>${jogo.status}</td>
            </tr>
        `;
    });

});
</script>

</body>
</html>
